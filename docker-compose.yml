---
services:
  example:
    image: yolkhovyy/example:${EXAMPLE_VERSION:?must be set in .env}
    stop_signal: SIGINT
    depends_on:
      otel-collector:
        condition: service_started
    ports:
      - 8080:${EXAMPLE_HTTP_PORT:-8080}
    build:
      context: .
      dockerfile: cmd/example/Dockerfile
      target: ${BUILD_TARGET:-release}
    environment:
      - EXAMPLE_HTTP_PORT
      - EXAMPLE_HTTP_SHUTDOWNTIMEOUT
      - EXAMPLE_HTTP_READHEADERTIMEOUT
      - EXAMPLE_LOGGER_ENABLE
      - EXAMPLE_LOGGER_COLLECTOR_PROTOCOL
      - EXAMPLE_LOGGER_COLLECTOR_CONNECTION
      - EXAMPLE_TRACER_ENABLE
      - EXAMPLE_TRACER_COLLECTOR_PROTOCOL
      - EXAMPLE_TRACER_COLLECTOR_CONNECTION
      - EXAMPLE_METRIC_ENABLE
      - EXAMPLE_METRIC_PROMETHEUS
      - EXAMPLE_METRIC_INTERVAL
      - EXAMPLE_METRIC_COLLECTOR_PROTOCOL
      - EXAMPLE_METRIC_COLLECTOR_CONNECTION

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    restart: unless-stopped
    volumes:
      - ./config/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "9464:9464"   # Prometheus metrics
      - "8888:8888"

  uptrace:
    image: uptrace/uptrace:latest
    container_name: uptrace
    ports:
      - "14317:14317"   # OTLP gRPC
      - "14318:14318"   # OTLP HTTP
      - "8200:8200"     # Uptrace UI
    # environment:
    #   UPTRACE_DSN: "http://<your-uptrace-token>@uptrace:14317" # Replace with your DSN
    depends_on:
      otel-collector:
        condition: service_started
      postgres:
        condition: service_started
      clickhouse:
        condition: service_started
    volumes:
      - ./config/uptrace.yml:/etc/uptrace/uptrace.yml

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: uptrace
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"   # HTTP port
      - "9000:9000"   # Native client port
      - "9009:9009"   # interserver port
    volumes:
      - clickhouse-data:/var/lib/clickhouse/
      - clickhouse-config:/etc/clickhouse-server/
      - ./config/users.xml:/etc/clickhouse-server/users.xml
    environment:
      CLICKHOUSE_DB: uptrace
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # jaeger:
  #   image: jaegertracing/all-in-one:latest
  #   container_name: jaeger
  #   volumes:
  #     - ./config/jaeger-ui-config.json:/etc/jaeger/jaeger-ui.json
  #   command: --query.ui-config /etc/jaeger/jaeger-ui.json
  #   ports:
  #     - "16686:16686"   # Jaeger UI
  #     # - "14317:4317"  # OTLP gRPC
  #     # - "14250:14250" # Jaeger gRPC
  #   restart: unless-stopped
